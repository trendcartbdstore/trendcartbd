<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Trend Cart BD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face { font-family: 'Chunk'; src: url('fonts/Chunk.ttf') format('truetype'); }
    @font-face { font-family: 'Alinur'; src: url('fonts/Li Alinur Sangbadpatra2 Unicode.ttf') format('truetype'); }
    body { font-family: 'Alinur', sans-serif; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-md mx-auto pt-20 px-6">
    <h1 class="text-4xl font-bold text-center mb-10">👑 Admin Login</h1>

    <!-- Login Form -->
    <div class="bg-gray-900 rounded-3xl p-8">
      <input id="username" type="text" placeholder="ইউজারনেম" class="w-full p-4 mb-4 bg-gray-800 rounded-2xl">
      <input id="password" type="password" placeholder="পাসওয়ার্ড" class="w-full p-4 mb-6 bg-gray-800 rounded-2xl">
      <button onclick="login()" class="w-full bg-orange-500 py-4 rounded-2xl font-bold">লগইন করুন</button>
    </div>
  </div>

  <script>
    function login() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      if (user === "badshah" && pass === "12345") {
        alert("👑 স্বাগতম, মিস্কিনদের বাদশাহ বন্দে আলী মিয়া!");
        window.location.href = "admin-full.html"; // Full access
      } 
      else if (user === "raja" && pass === "12345") {
        alert("👑 স্বাগতম, রাজা ফকির লাল বাহাদুর!");
        window.location.href = "admin-moderator.html"; // Limited access
      } 
      else {
        alert("❌ ভুল ইউজারনেম বা পাসওয়ার্ড");
      }
    }
  </script>
</body>
</html>
