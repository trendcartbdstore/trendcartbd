 
<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Trend Cart BD</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    @font-face {
      font-family: 'Chunk';
      src: url('fonts/Chunk.ttf') format('truetype');
      font-weight: bold;
    }
    @font-face {
      font-family: 'Alinur';
      src: url('fonts/Li Alinur Sangbadpatra2 Unicode.ttf') format('truetype');
    }
    body { font-family: 'Alinur', sans-serif; }
    h1, h2 { font-family: 'Chunk', sans-serif; }
    .product-card {
      transition: all 0.3s;
    }
    .product-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950">

  <nav class="bg-white dark:bg-gray-900 border-b sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-blue-700 to-orange-500 rounded-2xl flex items-center justify-center text-white text-2xl font-black">T</div>
        <span class="text-2xl font-bold text-blue-700">TREND CART BD</span>
      </a>
      <div class="flex gap-6 text-2xl">
        <a href="index.html"><i class="fa-solid fa-home"></i></a>
        <i class="fa-solid fa-cart-shopping"></i>
      </div>
    </div>
  </nav>

  <div class="max-w-6xl mx-auto px-4 py-8">
    <h1 class="text-4xl font-bold text-center mb-10">Our Products</h1>
    
    <div class="grid grid-cols-2 md:grid-cols-3 gap-6" id="products">
      <!-- Products will load here -->
    </div>
  </div>

  <script>
    const products = [
      { id: 1, name: "iPhone 15 Pro", price: 134999, img: "https://picsum.photos/id/20/300/300" },
      { id: 2, name: "Sony Headphones", price: 17999, img: "https://picsum.photos/id/201/300/300" },
      { id: 3, name: "Smart Watch", price: 8999, img: "https://picsum.photos/id/180/300/300" }
    ];

    const container = document.getElementById('products');
    products.forEach(product => {
      const card = document.createElement('div');
      card.className = 'product-card bg-white dark:bg-gray-800 rounded-3xl overflow-hidden';
      card.innerHTML = `
        <img src="${product.img}" class="w-full h-48 object-cover">
        <div class="p-4">
          <h3 class="font-semibold text-lg">${product.name}</h3>
          <p class="text-orange-500 font-bold text-xl">৳ ${product.price}</p>
          <button onclick="addToCart(${product.id})" 
                  class="mt-4 w-full bg-blue-600 text-white py-3 rounded-2xl font-medium">
            Add to Cart
          </button>
        </div>
      `;
      container.appendChild(card);
    });

    function addToCart(id) {
      alert('✅ Product added to cart! (ID: ' + id + ')');
    }
  </script>

</body>
</html>
